<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LANA CROSS - Ganhe Dinheiro Todos os Dias</title>
    <style>
        /* Reset e Configurações Base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100vw;
            height: 100vh;
            overflow: hidden; /* Impede o scroll */
            background: #0a0a0a;
            color: #ffffff;
        }

        /* Fundo com Gradiente Animado */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0b2e 50%, #0a0a0a 100%);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            z-index: -2;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Efeito de Partículas/Brilho */
        .glow-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(147, 51, 234, 0.1) 0%, transparent 70%);
            pointer-events: none;
            z-index: -1;
        }

        /* Container Principal */
        .main-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            opacity: 0;
            transform: scale(0.95);
            animation: fadeInScale 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeInScale {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Logo */
        .logo {
            font-size: 2.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 40px;
            color: #fff;
            text-shadow: 0 0 10px rgba(147, 51, 234, 0.8), 0 0 20px rgba(147, 51, 234, 0.4);
        }

        .logo span {
            color: #9333ea;
        }

        /* Headline e Subtítulo */
        .headline {
            font-size: clamp(2rem, 8vw, 4rem);
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 15px;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #fff, #ccc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: clamp(1rem, 4vw, 1.5rem);
            color: #a1a1aa;
            margin-bottom: 50px;
            max-width: 600px;
        }

        /* Botão de CTA */
        .cta-button {
            position: relative;
            display: inline-block;
            padding: 22px 45px;
            font-size: 1.4rem;
            font-weight: 800;
            text-decoration: none;
            color: #000;
            background: #22c55e; /* Verde Neon */
            border-radius: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.4);
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            animation: pulse 2s infinite;
        }

        .cta-button:hover {
            transform: translateY(-3px) scale(1.05);
            background: #4ade80;
            box-shadow: 0 0 35px rgba(34, 197, 94, 0.7);
        }

        .cta-button:active {
            transform: scale(0.95);
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }

        /* Prova Social */
        .social-proof {
            margin-top: 25px;
            font-size: 0.9rem;
            color: #71717a;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .social-proof::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 8px #22c55e;
            animation: blink 1.5s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Efeito de Vibração no Clique */
        .vibrate {
            animation: vibrate 0.1s linear 2;
        }

        @keyframes vibrate {
            0% { transform: translate(0); }
            25% { transform: translate(2px, 2px); }
            50% { transform: translate(-2px, -2px); }
            75% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        /* Responsividade Mobile */
        @media (max-width: 768px) {
            .logo { font-size: 1.8rem; margin-bottom: 30px; }
            .cta-button { padding: 18px 35px; font-size: 1.1rem; width: 90%; max-width: 320px; }
            .subtitle { margin-bottom: 40px; }
        }
    </style>
</head>
<body>

    <div class="background"></div>
    <div class="glow-overlay"></div>

    <main class="main-container">
        <div class="logo"> L∆N∆ <span>CROSS</span></div>
        
        <h1 class="headline">GANHE DINHEIRO<br>TODOS OS DIAS</h1>
        
        <p class="subtitle">CRIE SUA CONTA AGORA E COMECE A JOGAR NA PLATAFORMA QUE PAGA MAIS E FAZ UM DEPOSITO DE NO MINIMO 100MT OU 200MT NO SEU PRIMEIRO DEPOSITO.</p>
        
        <a href="https://tracking.olabet.co.mz/C.ashx?btag=a_60b_7c_&affid=59&siteid=60&adid=7&c=" class="cta-button" id="mainBtn">
            CRIAR CONTA AGORA
        </a>
        
        <div class="social-proof">
            Mais de 100.000 jogadores ativos agora
        </div>
    </main>

    <script>
        // Efeito de vibração e clique
        const btn = document.getElementById('mainBtn');
        
        btn.addEventListener('click', function(e) {
            // Adiciona classe de vibração
            this.classList.add('vibrate');
            
            // Pequeno delay para a vibração ser visível antes de navegar (opcional)
            // Se quiser navegação imediata, remova o setTimeout
            setTimeout(() => {
                this.classList.remove('vibrate');
            }, 200);

            // Feedback tátil para dispositivos móveis que suportam
            if (window.navigator && window.navigator.vibrate) {
                window.navigator.vibrate(50);
            }
        });

        // Prevenir scroll acidental em dispositivos móveis
        document.addEventListener('touchmove', function(e) {
            e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
